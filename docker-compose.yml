services:
  frontend:
    build:
      context: ./frontend
    container_name: grievance-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --hostname 0.0.0.0

  backend:
    build:
      context: ./backend
    container_name: grievance-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL}
      AI_SERVICE_URL: http://ai-service:8000
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_started
    command: npm run dev

  ai-service:
    build:
      context: ./ai-service
    container_name: grievance-ai-service
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - ./ai-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:16
    container_name: grievance-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d grievance_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
